apiVersion: nexus.mia-platform.eu/v1alpha1
itemFamily: dockerimages
type: dockerimage
syncable: true
mappings:
  identifier: |-
    {{ printf "%s/%s:%s" .host .name .version | sha256sum }}
  metadata:
    title: |-
      {{ printf "%s/%s:%s" .host .name .version }}
  spec:
    host: "{{ .host }}"
    name: "{{ .name }}"
    version: "{{ .version }}"
    repository: "{{ get \"repository\" . \"\" }}"
    format: "{{ get \"format\" . \"\" }}"
    tags: "{{ get \"tags\" . (list) | toJSON }}"
    assets: |-
      {{ $list := list -}}
      {{- range .assets -}}
        {{- $asset := object -}}
        {{- $asset = set "sha256" (get "sha256" (get "checksum" . (object)) "") $asset -}}
        {{- $asset = set "downloadUrl" (get "downloadUrl" . "") $asset -}}
        {{- $asset = set "lastModified" (get "lastModified" . "") $asset -}}
        {{ $lastDownloaded := (get "lastDownloaded" . "") -}}
        {{- if $lastDownloaded -}}
          {{- $asset = set "lastDownloaded" $lastDownloaded $asset -}}
        {{- else -}}
          {{- $asset = set "lastDownloaded" "" $asset -}}
        {{- end }}
        {{- $list = append $list $asset -}}
      {{- end -}}
      {{- $list | toJSON }}
