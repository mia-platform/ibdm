apiVersion: console.mia-platform-experimental.eu/v1alpha1
itemFamily: customresources
type: custom-resource
syncable: true
mappings:
  identifier: |-
    {{ printf "%s-%s-%s" .project._id .revision.name .customResource.name | sha256sum }}
  metadata:
    title: "{{ printf \"%s\" .customResource.name }}"
  spec:
    projectUniqueId: "{{ .project._id }}"
    projectId: "{{ get \"projectId\" .project \"\" | quote }}"
    tenantId: "{{ .project.tenantId }}"
    revisionName: "{{ .revision.name }}"
    resourceName: "{{ .customResource.name }}"
    resourceKind: |-
      {{ $meta := (get "meta" .customResource (object)) -}}
      {{- get "kind" $meta "" }}
    resourceApiVersion: |-
      {{ $meta := (get "meta" .customResource (object)) -}}
      {{- get "apiVersion" $meta "" }}
    sourceMarketplaceItem: "{{ get \"sourceMarketplaceItem\" .customResource (object) | toJSON }}"
    configuration: "{{ get \"spec\" .customResource (object) | toJSON }}"
  extra:
    - apiVersion: mia-platform.eu/v1alpha1
      itemFamily: relationships
      deletePolicy: "cascade"
      identifier: |-
        {{ $src := printf "urn:mia-platform-catalog:console.mia-platform-experimental.eu:v1alpha1:CustomResource:%s" (printf "%s-%s-%s" .project._id .revision.name .customResource.name | sha256sum) -}}
        {{- $type := "urn:mia-platform-catalog:mia-platform.eu:v1alpha1:RelationshipType:part-of.mia-platform.eu" -}}
        {{- $tgt := printf "urn:mia-platform-catalog:console.mia-platform.eu:v1alpha1:Project:%s" .project._id -}}
        {{- printf "%s-%s-%s" $src $type $tgt | sha256sum }}
      sourceRef: |-
        urn:mia-platform-catalog:console.mia-platform-experimental.eu:v1alpha1:CustomResource:{{ printf "%s-%s-%s" .project._id .revision.name .customResource.name | sha256sum }}
      targetRef: |-
        urn:mia-platform-catalog:console.mia-platform.eu:v1alpha1:Project:{{ .project._id }}
      typeRef: "urn:mia-platform-catalog:mia-platform.eu:v1alpha1:RelationshipType:part-of.mia-platform.eu"
    - apiVersion: mia-platform.eu/v1alpha1
      itemFamily: relationships
      deletePolicy: "cascade"
      identifier: |-
        {{ $src := printf "urn:mia-platform-catalog:console.mia-platform-experimental.eu:v1alpha1:CustomResource:%s" (printf "%s-%s-%s" .project._id .revision.name .customResource.name | sha256sum) -}}
        {{- $type := "urn:mia-platform-catalog:mia-platform.eu:v1alpha1:RelationshipType:part-of.mia-platform.eu" -}}
        {{- $tgt := printf "urn:mia-platform-catalog:console.mia-platform.eu:v1alpha1:Revision:%s" (printf "%s-%s" .project._id .revision.name | sha256sum) -}}
        {{- printf "%s-%s-%s" $src $type $tgt | sha256sum }}
      sourceRef: |-
        urn:mia-platform-catalog:console.mia-platform-experimental.eu:v1alpha1:CustomResource:{{ printf "%s-%s-%s" .project._id .revision.name .customResource.name | sha256sum }}
      targetRef: |-
        urn:mia-platform-catalog:console.mia-platform.eu:v1alpha1:Revision:{{ printf "%s-%s" .project._id .revision.name | sha256sum }}
      typeRef: "urn:mia-platform-catalog:mia-platform.eu:v1alpha1:RelationshipType:part-of.mia-platform.eu"
    - apiVersion: mia-platform.eu/v1alpha1
      itemFamily: relationships
      deletePolicy: "cascade"
      createIf: |-
        {{ $info := (get "info" .project (object)) -}}
        {{- $teamContact := (get "teamContact" $info nil) -}}
        {{- if $teamContact -}}
          true
        {{- else -}}
          false
        {{- end }}
      identifier: |-
        {{ $info := (get "info" .project (object)) -}}
        {{- $teamContact := (get "teamContact" $info "") -}}
        {{- $src := printf "urn:mia-platform-catalog:iam.mia-platform.eu:v1alpha1:User:%s" ($teamContact | sha256sum) -}}
        {{- $type := "urn:mia-platform-catalog:mia-platform.eu:v1alpha1:RelationshipType:ownership.mia-platform.eu" -}}
        {{- $tgt := printf "urn:mia-platform-catalog:console.mia-platform-experimental.eu:v1alpha1:CustomResource:%s" (printf "%s-%s-%s" .project._id .revision.name .customResource.name | sha256sum) -}}
        {{- printf "%s-%s-%s" $src $type $tgt | sha256sum }}
      sourceRef: |-
        {{ $info := (get "info" .project (object)) -}}
        {{- $teamContact := (get "teamContact" $info "") -}}
        urn:mia-platform-catalog:iam.mia-platform.eu:v1alpha1:User:{{ $teamContact | sha256sum }}
      targetRef: |-
        urn:mia-platform-catalog:console.mia-platform-experimental.eu:v1alpha1:CustomResource:{{ printf "%s-%s-%s" .project._id .revision.name .customResource.name | sha256sum }}
      typeRef: "urn:mia-platform-catalog:mia-platform.eu:v1alpha1:RelationshipType:ownership.mia-platform.eu"
