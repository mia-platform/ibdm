apiVersion: bitbucket.mia-platform.eu/v1alpha1
itemFamily: pipelines
type: pipeline
syncable: true
mappings:
  identifier: |-
    {{ .pipeline.uuid | trimPrefix "{" | trimSuffix "}" | sha256sum }}
  metadata:
    title: |-
      {{ printf "%s #%v" .repository.name .pipeline.build_number | quote }}
  spec:
    uuid: "{{ .pipeline.uuid | trimPrefix \"{\" | trimSuffix \"}\" }}"
    buildNumber: "{{ .pipeline.build_number }}"
    state: |-
      {{ $s := (get "state" .pipeline "") -}}
      {{- if $s -}}{{- .pipeline.state.name -}}{{- else -}}{{- "" | quote -}}{{- end }}
    result: |-
      {{ $s := (get "state" .pipeline "") -}}
      {{- $r := (get "result" $s "") -}}
      {{- if $r -}}{{- .pipeline.state.result.name -}}{{- else -}}{{- "" | quote -}}{{- end }}
    createdOn: "{{ .pipeline.created_on }}"
    completedOn: |-
      {{ $c := (get "completed_on" .pipeline "") -}}
      {{- if $c -}}{{- .pipeline.completed_on -}}{{- else -}}{{- "" | quote -}}{{- end }}
    durationInSeconds: |-
      {{ $d := (get "duration_in_seconds" .pipeline "") -}}
      {{- if $d -}}{{- .pipeline.duration_in_seconds -}}{{- else -}}{{- "" | quote -}}{{- end }}
    buildSecondsUsed: |-
      {{ $d := (get "build_seconds_used" .pipeline "") -}}
      {{- if $d -}}{{- .pipeline.build_seconds_used -}}{{- else -}}{{- "" | quote -}}{{- end }}
    targetRef: |-
      {{ $t := (get "target" .pipeline "") -}}
      {{- if $t -}}{{- .pipeline.target.ref_name -}}{{- else -}}{{- "" | quote -}}{{- end }}
    repositoryFullName: "{{ .repository.full_name }}"
    repositoryHtmlUrl: "{{ .repository.links.html.href }}"
  extra:
    - apiVersion: mia-platform.eu/v1alpha1
      itemFamily: relationships
      deletePolicy: "cascade"
      identifier: |-
        {{ $src := printf "urn:mia-platform-catalog:bitbucket.mia-platform.eu:v1alpha1:Pipeline:%s" (.pipeline.uuid | trimPrefix "{" | trimSuffix "}" | sha256sum) -}}
        {{- $type := "urn:mia-platform-catalog:mia-platform.eu:v1alpha1:RelationshipType:part-of.mia-platform.eu" -}}
        {{- $tgt := printf "urn:mia-platform-catalog:bitbucket.mia-platform.eu:v1alpha1:Repository:%s" (.repository.links.html.href | sha256sum) -}}
        {{- printf "%s-%s-%s" $src $type $tgt | sha256sum }}
      sourceRef: |-
        urn:mia-platform-catalog:bitbucket.mia-platform.eu:v1alpha1:Pipeline:{{ .pipeline.uuid | trimPrefix "{" | trimSuffix "}" | sha256sum }}
      targetRef: |-
        urn:mia-platform-catalog:bitbucket.mia-platform.eu:v1alpha1:Repository:{{ .repository.links.html.href | sha256sum }}
      typeRef: "urn:mia-platform-catalog:mia-platform.eu:v1alpha1:RelationshipType:part-of.mia-platform.eu"
