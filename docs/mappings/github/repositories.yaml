apiVersion: github.mia-platform.eu/v1
itemFamily: repositories
type: repository
extra:
  apiVersion: "2026-03-10"
syncable: true
mappings:
  identifier: |-
    {{ printf "%.0f-%s" .repository.id .repository.html_url | sha256sum }}
  metadata:
    title: "{{ .repository.full_name }}"
  spec:
    id: "{{ .repository.id }}"
    name: "{{ .repository.name }}"
    fullName: "{{ .repository.full_name }}"
    description: "{{ .repository.description }}"
    htmlUrl: "{{ .repository.html_url }}"
    language: |-
      {{ $language := (get "language" .repository "") -}}
      {{- if $language -}}
        {{- .repository.language -}}
      {{- else -}}
        {{- "" | quote -}}
      {{- end }}
    languages: "{{ get \"repositoryLanguages\" . (object) | toJSON }}"
    visibility: "{{ .repository.visibility }}"
    defaultBranch: "{{ .repository.default_branch }}"
    archived: "{{ .repository.archived }}"
    fork: "{{ .repository.fork }}"
    stargazersCount: "{{ .repository.stargazers_count }}"
    forksCount: "{{ .repository.forks_count }}"
    openIssuesCount: "{{ .repository.open_issues_count }}"
    license: |-
      {{ $license := (get "license" .repository "") -}}
      {{- if $license -}}
        {{- .repository.license.spdx_id -}}
      {{- else -}}
        {{- "" | quote -}}
      {{- end }}
    topics: "{{ .repository.topics | toJSON }}"
    created: |-
      {{ $created := (get "created_at" .repository "") -}}
      {{- if $created -}}
        {{- $isNumberCheck := isNumber .repository.created_at -}}
        {{- if $isNumberCheck -}}
          {{- convertFromTimestamp .repository.created_at -}}
        {{- else -}}
          {{- .repository.created_at -}}
        {{- end -}}
      {{- else -}}
        {{- "" | quote -}}
      {{- end }}
    lastUpdate: |-
      {{ $updated := (get "updated_at" .repository "") -}}
      {{- if $updated -}}
        {{- $isNumberCheck := isNumber .repository.updated_at -}}
        {{- if $isNumberCheck -}}
          {{- convertFromTimestamp .repository.updated_at -}}
        {{- else -}}
          {{- .repository.updated_at -}}
        {{- end -}}
      {{- else -}}
        {{- "" | quote -}}
      {{- end }}
    lastPush: |-
      {{ $pushed := (get "pushed_at" .repository "") -}}
      {{- if $pushed -}}
        {{- $isNumberCheck := isNumber .repository.pushed_at -}}
        {{- if $isNumberCheck -}}
          {{- convertFromTimestamp .repository.pushed_at -}}
        {{- else -}}
          {{- .repository.pushed_at -}}
        {{- end -}}
      {{- else -}}
        {{- "" | quote -}}
      {{- end }}
