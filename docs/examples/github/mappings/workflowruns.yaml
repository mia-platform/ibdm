apiVersion: github.mia-platform.eu/v1alpha1
itemFamily: workflowruns
type: workflow_run
extra:
  apiVersion: "2026-03-10"
syncable: true
mappings:
  identifier: |-
    {{ printf "%v" .workflow_run.id | sha256sum }}
  metadata:
    title: |-
      "{{ printf "%s %s #%v" .workflow_run.repository.full_name .workflow_run.name .workflow_run.run_number }}"
  spec:
    id : "{{ .workflow_run.id }}"
    name: "{{ .workflow_run.name }}"
    displayTitle: "{{ .workflow_run.display_title | quote }}"
    status: "{{ .workflow_run.status }}"
    conclusion: "{{ .workflow_run.conclusion }}"
    workflowId: "{{ .workflow_run.workflow_id }}"
    workflowPath: "{{ .workflow_run.path }}"
    repositoryId: "{{ .workflow_run.repository.id }}"
    repositoryFullName: "{{ .workflow_run.repository.full_name }}"
    headBranch: "{{ .workflow_run.head_branch }}"
    headSha: "{{ .workflow_run.head_sha }}"
    event: "{{ .workflow_run.event }}"
    runNumber: "{{ .workflow_run.run_number }}"
    runAttempt: "{{ .workflow_run.run_attempt }}"
    url: "{{ .workflow_run.html_url }}"
    created: "{{ .workflow_run.created_at }}"
    updated: "{{ .workflow_run.updated_at }}"
    runStartedAt: "{{ .workflow_run.run_started_at }}"
