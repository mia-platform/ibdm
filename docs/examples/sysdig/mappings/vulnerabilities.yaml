apiVersion: sysdig.mia-platform.eu/v1alpha1
itemFamily: vulnerabilities
type: vulnerability
syncable: true
mappings:
  identifier: |-
    {{ printf "%s" .vuln.name | sha256sum }}
  metadata:
    title: |-
      {{ printf "%s" .vuln.name }}
  spec:
    acceptedRisk: "{{ .vuln.acceptedRisk }}"
    acceptedRiskInPipeline: "{{ .vuln.acceptedRiskInPipeline }}"
    acceptedRiskInRuntime: "{{ .vuln.acceptedRiskInRuntime }}"
    createdAt: "{{ .vuln.createdAt }}"
    customerId: "{{ .vuln.customerId }}"
    cvssScore: "{{ .vuln.cvssScore }}"
    cvssSource: "{{ .vuln.cvssSource }}"
    cvssVector: "{{ .vuln.cvssVector }}"
    cvssVersion: "{{ .vuln.cvssVersion | quote }}"
    epssPercentile: "{{ .vuln.epssPercentile }}"
    epssScore: "{{ .vuln.epssScore }}"
    firstSeen: "{{ .vuln.firstSeen }}"
    fixDate: "{{ .vuln.fixDate }}"
    fixedInVersion: |-
      {{ $fixedInVersion := (get "fixedInVersion" .vuln "") -}}
      {{- if $fixedInVersion -}}
        {{- .vuln.fixedInVersion  -}}
      {{- else -}}
        {{- "" | quote -}}
      {{- end }}
    globalId: "{{ .vuln.globalId }}"
    hasExploit: "{{ .vuln.hasExploit }}"
    hasFix: "{{ .vuln.hasFix }}"
    hash: "{{ .vuln.hash }}"
    inUse: "{{ .vuln.inUse }}"
    knownRansomwareCampaignUse: "{{ .vuln.knownRansomwareCampaignUse }}"
    lastModified: "{{ .vuln.lastModified }}"
    name: "{{ .vuln.name }}"
    namespace: "{{ .vuln.namespace }}"
    packageInfo: "{{ .vuln.packageInfo }}"
    packageName: "{{ .vuln.packageName }}"
    packagePath: "{{ .vuln.packagePath }}"
    packageType: "{{ .vuln.packageType }}"
    packageVersion: "{{ .vuln.packageVersion }}"
    publicationDate: "{{ .vuln.publicationDate }}"
    purl: "{{ .vuln.purl }}"
    severity: "{{ .vuln.severity }}"
    severityInt: "{{ .vuln.severityInt }}"
    solutionDate: "{{ .vuln.solutionDate }}"
    suggestedFix: |-
      {{ $suggestedFix := (get "suggestedFix" .vuln "") -}}
      {{- if $suggestedFix -}}
        {{- .vuln.suggestedFix  -}}
      {{- else -}}
        {{- "" | quote -}}
      {{- end }}
  extra:
    - apiVersion: mia-platform.eu/v1alpha1
      itemFamily: relationships
      deletePolicy: "none"
      identifier: |-
        {{ printf "rel-vuln-%s-%s" (.vuln.name | sha256sum) (printf "%s" .img.imageReference | sha256sum) | sha256sum }}
      sourceRef: |-
        urn:mia-platform-catalog:sysdig.mia-platform.eu:v1alpha1:Vulnerability:null:{{ printf "%s" .vuln.name | sha256sum }}
      targetRef: |-
        urn:mia-platform-catalog:nexus.mia-platform.eu:v1alpha1:DockerImage:null:{{ printf "%s" .img.imageReference | sha256sum }}
      typeRef: "urn:mia-platform-catalog:mia-platform.eu:v1alpha1:RelationshipType:null:vulnerability.mia-platform.eu"
