apiVersion: sysdig.mia-platform.eu/v1alpha1
itemFamily: vulnerabilities
type: vulnerability
syncable: true
mappings:
  identifier: |-
    {{ printf "%s" .vuln.name | sha256sum }}
  metadata:
    title: |-
      {{ printf "%s" .vuln.name }}
  spec:
    createdAt: "{{ get \"createdAt\" .vuln (\"\" | quote) }}"
    cvssScore: "{{ .vuln.cvssScore }}"
    cvssSource: "{{ .vuln.cvssSource }}"
    cvssVector: "{{ .vuln.cvssVector }}"
    cvssVersion: "{{ .vuln.cvssVersion | quote }}"
    firstSeen: "{{ get \"firstSeen\" .vuln (\"\" | quote) }}"
    fixDate: "{{ get \"fixDate\" .vuln (\"\" | quote) }}"
    fixedInVersion: |-
      {{ $fixedInVersion := (get "fixedInVersion" .vuln "") -}}
      {{- if $fixedInVersion -}}
        {{- .vuln.fixedInVersion  -}}
      {{- else -}}
        {{- "" | quote -}}
      {{- end }}
    globalId: "{{ get \"globalId\" .vuln (\"\" | quote) }}"
    hasExploit: "{{ get \"hasExploit\" .vuln (\"\" | quote) }}"
    hasFix: "{{ get \"hasFix\" .vuln (\"\" | quote) }}"
    hash: "{{ get \"hash\" .vuln (\"\" | quote) }}"
    inUse: "{{ get \"inUse\" .vuln (\"\" | quote) }}"
    knownRansomwareCampaignUse: "{{ get \"knownRansomwareCampaignUse\" .vuln (\"\" | quote) }}"
    lastModified: "{{ get \"lastModified\" .vuln (\"\" | quote) }}"
    name: "{{ .vuln.name }}"
    namespace: "{{ get \"namespace\" .vuln (list) | toJSON }}"
    packageInfo: "{{ get \"packageInfo\" .vuln (\"\" | quote) }}"
    packageName: "{{ get \"packageName\" .vuln (\"\" | quote) }}"
    packagePath: "{{ get \"packagePath\" .vuln (\"\" | quote) }}"
    packageType: "{{ get \"packageType\" .vuln (\"\" | quote) }}"
    packageVersion: "{{ get \"packageVersion\" .vuln (\"\" | quote) }}"
    publicationDate: |-
      {{ $publicationDate := (get "publicationDate" .vuln "") -}}
      {{- if $publicationDate -}}
        {{- .vuln.publicationDate  -}}
      {{- else -}}
        {{- "" | quote -}}
      {{- end }}
    purl: "{{ get \"purl\" .vuln (\"\" | quote) }}"
    severity: "{{ .vuln.severity }}"
    solutionDate: |-
      {{ $solutionDate := (get "solutionDate" .vuln "") -}}
      {{- if $solutionDate -}}
        {{- .vuln.solutionDate  -}}
      {{- else -}}
        {{- "" | quote -}}
      {{- end }}
    suggestedFix: "{{ get \"suggestedFix\" .vuln (\"\" | quote) }}"
  extra:
    - apiVersion: mia-platform.eu/v1alpha1
      itemFamily: relationships
      deletePolicy: "none"
      identifier: |-
        {{ $src := printf "urn:mia-platform-catalog:sysdig.mia-platform.eu:v1alpha1:Vulnerability:%s" (printf "%s" .vuln.name | sha256sum) -}}
        {{- $type := "urn:mia-platform-catalog:mia-platform.eu:v1alpha1:RelationshipType:affect.mia-platform.eu" -}}
        {{- $tgt := printf "urn:mia-platform-catalog:nexus.mia-platform.eu:v1alpha1:DockerImage:%s" (printf "%s" .img.imageReference | sha256sum) -}}
        {{- printf "%s-%s-%s" $src $type $tgt | sha256sum }}
      sourceRef: |-
        urn:mia-platform-catalog:sysdig.mia-platform.eu:v1alpha1:Vulnerability:{{ printf "%s" .vuln.name | sha256sum }}
      targetRef: |-
        urn:mia-platform-catalog:nexus.mia-platform.eu:v1alpha1:DockerImage:{{ printf "%s" .img.imageReference | sha256sum }}
      typeRef: "urn:mia-platform-catalog:mia-platform.eu:v1alpha1:RelationshipType:affect.mia-platform.eu"
