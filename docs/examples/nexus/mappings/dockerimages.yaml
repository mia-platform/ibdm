apiVersion: nexus.mia-platform.eu/v1alpha1
itemFamily: dockerimages
type: dockerimage
syncable: true
mappings:
  identifier: |-
    {{ printf "%s/%s:%s" .host .name .version | sha256sum }}
  metadata:
    title: |-
      {{ printf "%s/%s:%s" .host .name .version }}
  spec:
    host: "{{ .host }}"
    name: "{{ .name }}"
    version: "{{ .version }}"
    repository: "{{ get \"repository\" . \"\" }}"
    format: "{{ get \"format\" . \"\" }}"
    tags: "{{ get \"tags\" . (list) | toJSON }}"
    downloadUrl: "{{ get \"downloadUrl\" .asset \"\" }}"
    sha256: "{{ get \"sha256\" .asset.checksum \"\" }}"
    lastModified: "{{ get \"lastModified\" .asset (now) }}"
    lastDownloaded: "{{ get \"lastDownloaded\" .asset (now) }}"
