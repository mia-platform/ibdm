apiVersion: nexus.mia-platform.eu/v1alpha1
itemFamily: repositories
type: repository
syncable: true
mappings:
  identifier: |-
    {{ printf "%s.%s" .name .format | sha256sum }}
  metadata:
    title: "{{ .name }}"
    description: "Nexus {{ .type }} repository ({{ .format }})"
  spec:
    name: "{{ .name }}"
    format: "{{ .format }}"
    repositoryType: "{{ .type }}"
    url: "{{ .url }}"
