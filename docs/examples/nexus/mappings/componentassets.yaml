apiVersion: nexus.mia-platform.eu/v1alpha1
itemFamily: componentassets
type: componentasset
syncable: true
mappings:
  identifier: |-
    {{ printf "%s" .asset.id | sha256sum }}
  metadata:
    title: |-
      {{ printf "%s/%s:%s" .host .name .version }}
  spec:
    componentId: "{{ .id }}"
    repository: "{{ .repository }}"
    format: "{{ .format }}"
    group: "{{ get \"group\" . \"\" | quote }}"
    name: "{{ .name }}"
    version: "{{ .version }}"
    tags: "{{ get \"tags\" . (list) | toJSON }}"
    asset: |-
      {{ $asset := object -}}
      {{ $checksum := object -}}
      {{- $asset = set "id" .asset.id $asset -}}
      {{- $asset = set "downloadUrl" .asset.downloadUrl $asset -}}
      {{- $asset = set "path" .asset.path $asset -}}
      {{- $asset = set "repository" .asset.repository $asset -}}
      {{- $asset = set "format" .asset.format $asset -}}
      {{- $checksum = set "sha1" .asset.checksum.sha1 $checksum -}}
      {{- $checksum = set "sha256" .asset.checksum.sha256 $checksum -}}
      {{- $asset = set "checksum" $checksum $asset -}}
      {{- $asset = set "contentType" (get "contentType" .asset "") $asset -}}
      {{- $asset = set "lastModified" (get "lastModified" .asset (now)) $asset -}}
      {{- $asset = set "lastDownloaded" (get "lastDownloaded" .asset (now)) $asset -}}
      {{- $asset = set "uploader" (get "uploader" .asset "") $asset -}}
      {{- $asset = set "fileSize" (get "fileSize" .asset 0) $asset -}}
      {{- if (get "blobCreated" .asset "") -}}
        {{- $asset = set "blobCreated" .asset.blobCreated $asset -}}
      {{- else -}}
        {{- $asset = set "blobCreated" "" $asset -}}
      {{- end -}}
      {{- if (get "blobStoreName" .asset "") -}}
        {{- $asset = set "blobStoreName" .asset.blobStoreName $asset -}}
      {{- else -}}
        {{- $asset = set "blobStoreName" "" $asset -}}
      {{- end -}}
      {{- $asset = set "docker" (get "docker" .asset (object)) $asset -}}
      {{- $asset | toJSON }}
  extra:
    - apiVersion: mia-platform.eu/v1alpha1
      itemFamily: relationships
      deletePolicy: "cascade"
      identifier: |-
        {{ printf "%s-%s" (printf "%s/%s:%s" .host .name .version | sha256sum) (printf "%s" .asset.id | sha256sum) | sha256sum }}
      sourceRef: |-
        urn:mia-platform-catalog:nexus.mia-platform.eu:v1alpha1:DockerImage:null:{{ printf "%s/%s:%s" .host .name .version | sha256sum }}
      targetRef: |-
        urn:mia-platform-catalog:nexus.mia-platform.eu:v1alpha1:ComponentAsset:null:{{ printf "%s" .asset.id | sha256sum }}
      typeRef: "urn:mia-platform-catalog:mia-platform.eu:v1alpha1:RelationshipType:null:dependency.mia-platform.eu"
