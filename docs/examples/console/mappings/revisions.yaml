apiVersion: console.mia-platform.eu/v1alpha1
itemFamily: revisions
type: revision
syncable: true
mappings:
  identifier: |-
    {{ printf "%s-%s" .project._id .revision.name | sha256sum }}
  metadata:
    title: "{{ printf \"%s\" .revision.name }}"
  spec: {}
  extra:
    - apiVersion: mia-platform.eu/v1alpha1
      itemFamily: relationships
      deletePolicy: "cascade"
      identifier: |-
        {{ printf "relationship-%s-%s-belonging" (printf "%s-%s" .project._id .revision.name | sha256sum) .project._id | sha256sum }}
      sourceRef: |-
        urn:mia-platform-catalog:console.mia-platform.eu:v1alpha1:Revision:null:{{ printf "%s-%s" .project._id .revision.name | sha256sum }}
      targetRef: |-
        urn:mia-platform-catalog:console.mia-platform.eu:v1alpha1:Project:null:{{ .project._id }}
      typeRef: "urn:mia-platform-catalog:mia-platform.eu:v1alpha1:RelationshipType:null:belonging.mia-platform.eu"
