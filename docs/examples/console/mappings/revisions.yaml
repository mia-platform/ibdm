apiVersion: console.mia-platform.eu/v1alpha1
itemFamily: revisions
type: revision
syncable: true
mappings:
  identifier: |-
    {{ printf "%s-%s" .project._id .revision.name | sha256sum }}
  metadata:
    title: "{{ printf \"%s\" .revision.name }}"
    labels: |-
      {{ $labels := object "mia-platform.eu/part-of-project" .project._id -}}
      {{- $labels | toJSON }}
  spec: {}
  extra:
    - apiVersion: mia-platform.eu/v1alpha1
      itemFamily: relationships
      deletePolicy: "cascade"
      identifier: |-
        {{ printf "relationship-%s-%s-%s-dependency" .project._id .project._id .revision.name | sha256sum }}
      sourceRef: "urn:mia-platform-catalog:console.mia-platform.eu:v1alpha1:Project:null:{{ .project._id }}"
      targetRef: |-
        urn:mia-platform-catalog:console.mia-platform.eu:v1alpha1:Revision:null:{{ printf "%s-%s" .project._id .revision.name | sha256sum }}
      typeRef: "urn:mia-platform-catalog:mia-platform.eu:v1alpha1:RelationshipType:null:dependency.mia-platform.eu"
