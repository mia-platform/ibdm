apiVersion: bitbucket.mia-platform.eu/v1alpha1
itemFamily: repositories
type: repository
syncable: true
mappings:
  identifier: |-
    {{ .repository.links.html.href | sha256sum }}
  metadata:
    title: "{{ .repository.full_name }}"
  spec:
    fullName: "{{ .repository.full_name }}"
    uuid: "{{ .repository.uuid | trimPrefix \"{\" | trimSuffix \"}\" }}"
    name: "{{ .repository.name }}"
    slug: "{{ .repository.slug }}"
    description: |-
      {{ $d := (get "description" .repository "") -}}
      {{- if $d -}}{{- .repository.description -}}{{- else -}}{{- "" | quote -}}{{- end }}
    isPrivate: "{{ .repository.is_private }}"
    scm: "{{ .repository.scm }}"
    language: |-
      {{ $l := (get "language" .repository "") -}}
      {{- if $l -}}{{- .repository.language -}}{{- else -}}{{- "" | quote -}}{{- end }}
    htmlUrl: "{{ .repository.links.html.href }}"
    defaultBranch: |-
      {{ $mb := (get "mainbranch" .repository "") -}}
      {{- if $mb -}}{{- .repository.mainbranch.name -}}{{- else -}}{{- "" | quote -}}{{- end }}
    createdOn: "{{ .repository.created_on }}"
    updatedOn: "{{ .repository.updated_on }}"
    projectName: |-
      {{ $p := (get "project" .repository "") -}}
      {{- if $p -}}{{- .repository.project.name -}}{{- else -}}{{- "" | quote -}}{{- end }}
    workspaceName: |-
      {{ $w := (get "workspace" .repository "") -}}
      {{- if $w -}}{{- .repository.workspace.name -}}{{- else -}}{{- "" | quote -}}{{- end }}
