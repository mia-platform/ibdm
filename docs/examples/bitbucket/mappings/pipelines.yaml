apiVersion: bitbucket.mia-platform.eu/v1alpha1
itemFamily: pipelines
type: pipeline
syncable: true
mappings:
  identifier: |-
    {{ .pipeline.uuid | sha256sum }}
  metadata:
    title: |-
      {{ printf "#%v" .pipeline.build_number | quote }}
  spec:
    uuid: "{{ .pipeline.uuid }}"
    buildNumber: "{{ .pipeline.build_number }}"
    state: |-
      {{ $s := (get "state" .pipeline "") -}}
      {{- if $s -}}{{- .pipeline.state.name -}}{{- else -}}{{- "" | quote -}}{{- end }}
    result: |-
      {{ $s := (get "state" .pipeline "") -}}
      {{- $r := (get "result" $s "") -}}
      {{- if $r -}}{{- .pipeline.state.result.name -}}{{- else -}}{{- "" | quote -}}{{- end }}
    createdOn: "{{ .pipeline.created_on }}"
    completedOn: |-
      {{ $c := (get "completed_on" .pipeline "") -}}
      {{- if $c -}}{{- .pipeline.completed_on -}}{{- else -}}{{- "" | quote -}}{{- end }}
    targetRef: |-
      {{ $t := (get "target" .pipeline "") -}}
      {{- if $t -}}{{- .pipeline.target.ref_name -}}{{- else -}}{{- "" | quote -}}{{- end }}
    repositoryFullName: "{{ .repository.full_name }}"
  extra:
    - apiVersion: mia-platform.eu/v1alpha1
      itemFamily: relationships
      deletePolicy: "cascade"
      identifier: |-
        {{ $src := printf "urn:mia-platform-catalog:bitbucket.mia-platform.eu:v1alpha1:Pipeline:null:%s" (.pipeline.uuid | sha256sum) -}}
        {{- $type := "urn:mia-platform-catalog:mia-platform.eu:v1alpha1:RelationshipType:null:part-of.mia-platform.eu" -}}
        {{- $tgt := printf "urn:mia-platform-catalog:bitbucket.mia-platform.eu:v1alpha1:Repository:null:%s" (.repository.full_name | sha256sum) -}}
        {{- printf "%s-%s-%s" $src $type $tgt | sha256sum }}
      sourceRef: |-
        urn:mia-platform-catalog:bitbucket.mia-platform.eu:v1alpha1:Pipeline:null:{{ .pipeline.uuid | sha256sum }}
      targetRef: |-
        urn:mia-platform-catalog:bitbucket.mia-platform.eu:v1alpha1:Repository:null:{{ .repository.full_name | sha256sum }}
      typeRef: "urn:mia-platform-catalog:mia-platform.eu:v1alpha1:RelationshipType:null:part-of.mia-platform.eu"
