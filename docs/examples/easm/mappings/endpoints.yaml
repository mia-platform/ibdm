apiVersion: easm.mia-platform.eu/v1alpha1
itemFamily: endpoints
type: endpoint
syncable: true
mappings:
  identifier: "{{ .id | sha256sum }}"
  metadata:
    title: "{{ .id | quote }}"
  spec:
    host: "{{ get \"host\" . \"\" | quote }}"
    port: "{{ get \"port\" . 0 }}"
    http: "{{ get \"http\" . (object) | toJSON }}"
    tls: "{{ get \"tls\" . (object) | toJSON }}"
