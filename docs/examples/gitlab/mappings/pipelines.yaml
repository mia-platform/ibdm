apiVersion: gitlab.mia-platform.eu/v1alpha1
itemFamily: pipelines
type: pipeline
syncable: true
mappings:
  identifier: |-
    {{ printf "%s" .pipeline.id | sha256sum }}
  metadata:
    title: "{{ .pipeline.id }}"
  spec:
    id: "{{ .pipeline.id }}"
    created_at: "{{ get \"created_at\" .pipeline \"\" }}"
    finished_at: "{{ get \"finished_at\" .pipeline \"\" }}"
    projectId: "{{ .pipeline.project_id }}"
    ref: "{{ get \"ref\" .pipeline \"\" }}"
    sha: "{{ get \"sha\" .pipeline \"\" }}"
    source: "{{ get \"source\" .pipeline \"\" }}"
    status: "{{ get \"status\" .pipeline \"\" }}"
    userId: |-
      {{ $user := (get "user" .pipeline "") -}}
      {{- if $user -}}
        {{- $user.id -}}
      {{- else -}}
        {{- 0 -}}
      {{- end }}
    url: |-
      {{ $url := (get "url" .pipeline "") -}}
      {{- if $url -}}
        {{- .pipeline.url -}}
      {{- else -}}
        {{- "" | quote -}}
      {{- end }}
  extra:
    - apiVersion: mia-platform.eu/v1alpha1
      itemFamily: relationships
      deletePolicy: "cascade"
      identifier: |-
        {{ printf "relationship-%s-%s-dependency" (printf "%s" .project.id | sha256sum) (printf "%s" .pipeline.id | sha256sum) | sha256sum}}
      sourceRef: |-
        urn:mia-platform-catalog:gitlab.mia-platform.eu:v1alpha1:Project:null:{{ printf "%s" .project.id | sha256sum }}
      targetRef: |-
        urn:mia-platform-catalog:mia-platform.eu:v1alpha1:Pipeline:null:{{ printf "%s" .pipeline.id | sha256sum }}
      typeRef: "urn:mia-platform-catalog:mia-platform.eu:v1alpha1:RelationshipType:null:dependency.mia-platform.eu"
