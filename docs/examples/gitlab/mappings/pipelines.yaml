apiVersion: gitlab.mia-platform.eu/v1alpha1
itemFamily: pipelines
type: pipeline
syncable: true
mappings:
  identifier: |-
    {{ printf "%v" .pipeline.id | sha256sum }}
  metadata:
    title: "{{ .pipeline.name | quote }}"
  spec:
    id: "{{ .pipeline.id }}"
    name: "{{ .pipeline.name | quote }}"
