apiVersion: gitlab.mia-platform.eu/v1alpha1
itemFamily: pipelines
type: pipeline
syncable: true
mappings:
  identifier: |-
    {{ printf "%s" .pipeline.id | sha256sum }}
  metadata:
    title: |-
      {{ printf "%.0f" .pipeline.id | quote }}
  spec:
    id: "{{ .pipeline.id }}"
    created_at: "{{ get \"created_at\" .pipeline \"\" }}"
    finished_at: "{{ get \"finished_at\" .pipeline \"\" }}"
    projectId: "{{ .project.id }}"
    ref: "{{ get \"ref\" .pipeline \"\" }}"
    sha: "{{ get \"sha\" .pipeline \"\" }}"
    source: "{{ get \"source\" .pipeline \"\" }}"
    status: "{{ get \"status\" .pipeline \"\" }}"
    userId: |-
      {{ $user := (get "user" .pipeline "") -}}
      {{- if $user -}}
        {{- $user.id -}}
      {{- else -}}
        {{- 0 -}}
      {{- end }}
    url: |-
      {{ $url := (get "url" .pipeline "") -}}
      {{- if $url -}}
        {{- .pipeline.url -}}
      {{- else -}}
        {{- "" | quote -}}
      {{- end }}
  extra:
    - apiVersion: mia-platform.eu/v1alpha1
      itemFamily: relationships
      deletePolicy: "cascade"
      identifier: |-
        {{ $src := printf "urn:mia-platform-catalog:gitlab.mia-platform.eu:v1alpha1:Pipeline:null:%s" (printf "%s" .pipeline.id | sha256sum) -}}
        {{- $type := "urn:mia-platform-catalog:mia-platform.eu:v1alpha1:RelationshipType:null:part-of.mia-platform.eu" -}}
        {{- $tgt := printf "urn:mia-platform-catalog:gitlab.mia-platform.eu:v1alpha1:Project:null:%s" (printf "%s" .project.id | sha256sum) -}}
        {{- printf "%s-%s-%s" $src $type $tgt | sha256sum }}
      sourceRef: |-
        urn:mia-platform-catalog:gitlab.mia-platform.eu:v1alpha1:Pipeline:null:{{ printf "%s" .pipeline.id | sha256sum }}
      targetRef: |-
        urn:mia-platform-catalog:gitlab.mia-platform.eu:v1alpha1:Project:null:{{ printf "%s" .project.id | sha256sum }}
      typeRef: "urn:mia-platform-catalog:mia-platform.eu:v1alpha1:RelationshipType:null:part-of.mia-platform.eu"
