apiVersion: gitlab.mia-platform.eu/v1alpha1
itemFamily: projects
type: project
syncable: true
mappings:
  identifier: |-
    {{ printf "%v" .id }}
  metadata:
    title: "{{ .path_with_namespace }}"
  spec:
    id: "{{ .id }}"
    name: "{{ .name }}"
    description: |-
        {{ $description := (get "description" . "") -}}
        {{- if $description -}}
          {{- .description -}}
        {{- else -}}
          {{- "" | quote -}}
        {{- end }}
    descriptionHtml: "{{ get \"description_html\" . \"\" | quote }}"
    createdAt: "{{ .created_at }}"
    license: "{{ get \"license\" . (object) | toJSON }}"
    owner: "{{ get \"owner\" . (object) | toJSON }}"
    path: "{{ .path }}"
    pathWithNamespace: "{{ .path_with_namespace }}"
    repositoryAccessLevel: "{{ .repository_access_level }}"
    updatedAt: "{{ .updated_at }}"
    visibility: "{{ .visibility }}"
    webUrl: "{{ .web_url }}"
