apiVersion: gitlab.mia-platform.eu/v1alpha1
itemFamily: projects
type: project
syncable: true
mappings:
  identifier: |-
    {{ printf "%v" .project.id }}
  metadata:
    title: "{{ .project.path_with_namespace }}"
  spec:
    id: "{{ .project.id }}"
    name: "{{ .project.name }}"
    description: |-
        {{ $description := (get "description" .project "") -}}
        {{- if $description -}}
          {{- .project.description -}}
        {{- else -}}
          {{- "" | quote -}}
        {{- end }}
    descriptionHtml: "{{ get \"description_html\" .project \"\" | quote }}"
    createdAt: "{{ .project.created_at }}"
    license: "{{ get \"license\" .project (object) | toJSON }}"
    owner: "{{ get \"owner\" .project (object) | toJSON }}"
    path: "{{ .project.path }}"
    pathWithNamespace: "{{ .project.path_with_namespace }}"
    repositoryAccessLevel: "{{ .project.repository_access_level }}"
    updatedAt: "{{ .project.updated_at }}"
    visibility: "{{ .project.visibility }}"
    webUrl: "{{ .project.web_url }}"
    languages: "{{ .project_languages | toJSON }}"
